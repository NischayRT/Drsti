<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  .logo {
    width: 48px;
    height: 48px;
    border: 1.5px solid #c8f04a;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
  }
  .dot {
    width: 14px;
    height: 14px;
    background: #c8f04a;
    border-radius: 50%;
    box-shadow: 0 0 12px #c8f04a;
  }
  .name {
    font-size: 11px;
    color: #5f5f5f;
    letter-spacing: 0.22em;
    margin-bottom: 32px;
  }
  .bar-wrap {
    width: 120px;
    height: 2px;
    background: #141414;
    border-radius: 1px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    background: #c8f04a;
    border-radius: 1px;
    animation: load 2.4s ease-in-out forwards;
  }
  .status {
    margin-top: 14px;
    font-size: 9px;
    color: #464646;
    letter-spacing: 0.18em;
    animation: fadeIn 0.5s ease 0.3s forwards;
    opacity: 0;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,240,74,0); }
    50%       { box-shadow: 0 0 16px 2px rgba(200,240,74,0.15); }
  }
  @keyframes load {
    0%   { width: 0%; }
    30%  { width: 40%; }
    60%  { width: 70%; }
    85%  { width: 88%; }
    100% { width: 100%; }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="logo"><div class="dot"></div></div>
  <div class="name">AttentionOS</div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="status" id="status">STARTING AI ENGINE...</div>

  <script>
    const statuses = [
      'STARTING AI ENGINE...',
      'LOADING FACE DETECTOR...',
      'ALMOST READY...',
    ]
    let i = 0
    setInterval(() => {
      i = (i + 1) % statuses.length
      document.getElementById('status').textContent = statuses[i]
    }, 800)
  </script>
</body>
</html>
